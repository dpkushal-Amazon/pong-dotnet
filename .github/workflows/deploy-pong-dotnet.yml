name: Deploy pong-dotnet to Elastic Beanstalk

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  AWS_REGION: us-west-2
  EB_APPLICATION_NAME: Pong_dotNet
  EB_ENVIRONMENT_NAME: PongdotNet-env-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish app
        run: dotnet publish -c Release -o ./publish

      - name: Add Procfile to publish output
        run: cp Procfile ./publish/Procfile

      - name: Create deployment bundle
        working-directory: publish
        run: zip -r ../deploy.zip . -x ".*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          use_existing_version_if_available: false
          application_name: ${{ env.EB_APPLICATION_NAME }}
          environment_name: ${{ env.EB_ENVIRONMENT_NAME }}
          version_label: "gha-${{ github.run_number }}-${{ github.sha }}"
          region: ${{ env.AWS_REGION }}
          deployment_package: deploy.zip
